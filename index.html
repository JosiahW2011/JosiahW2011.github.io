<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>JS Cube</title>
        <style>
            body {
                margin: 0;
            }

            canvas {
                display: block;
            }
        </style>
    </head>

    <body>
        <div id="ctrls">
            <label>SpeedX:</label>
            <input type="range" id="speedx" min="-1" max="1" step="0.01">
            <label>SpeedY:</label>
            <input type="range" id="speedy" min="-1" max="1" step="0.01">
            <label>SpeedZ:</label>
            <input type="range" id="speedz" min="-1" max="1" step="0.01">
            <button id="reset_speed">Reset Speed</button>
            <button id="freezeStart">>||</button>
        </div>
        <script src="Cube.js"></script>
    </body>
</html>
